<style>
:root{
  --bg:#f7f5f0;
  --paper:#ffffff;
  --ink:#1c1a17;
  --muted:#6b6660;
  --rule:#d8d3c8;
  --accent:#7a3d2a;
  --soft:#f0ede6;
  --gray:#a39d92;
}
*{ box-sizing:border-box; }
html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  margin:0; padding:0;
  min-height:100vh;
}
.jspsych-display-element{
  font-family:'Inter',system-ui,sans-serif;
  font-size:16px;
  color:var(--ink);
  width:100%;
}
.jspsych-content-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.jspsych-content{
  max-width:760px;
  width:100%;
  padding:36px 40px;
  background:var(--paper);
  border:1px solid var(--rule);
  border-radius:3px;
  text-align:left;
}
h1,h2,h3{ font-family:'Crimson Pro',Georgia,serif; font-weight:600; margin-top:0; }
h1{ font-size:28px; margin-bottom:8px; }
h2{ font-size:22px; margin-bottom:12px; }
p{ line-height:1.55; margin:0 0 12px; }
.muted{ color:var(--muted); }
strong{ color:var(--ink); }
.kbd{
  font-family:'JetBrains Mono',monospace; font-size:12px;
  padding:2px 8px; border:1px solid var(--rule); border-radius:3px;
  background:var(--soft);
  display:inline-block;
}
.smallcaps{
  text-transform:uppercase; letter-spacing:.18em; font-size:11px;
  color:var(--accent); font-weight:600; margin-bottom:8px;
}
.lede{
  font-family:'Crimson Pro',Georgia,serif;
  font-size:18px; line-height:1.5; color:#3a3631; margin-bottom:16px;
}

/* Buttons */
.jspsych-btn{
  font-family:'Inter',sans-serif; font-size:14px;
  padding:10px 22px; background:var(--ink); color:#fff;
  border:none; border-radius:3px; cursor:pointer;
  margin:6px 4px;
}
.jspsych-btn:hover{ background:#3a3631; }

/* Surveys */
.jspsych-survey-text-question, .jspsych-survey-multi-choice-question{ margin-bottom:14px; }
.jspsych-survey-text-question label,
.jspsych-survey-multi-choice-text{
  display:block; font-size:14px; color:#3a3631;
  margin-bottom:6px; font-weight:500;
}
.jspsych-survey-text-question input,
.jspsych-survey-multi-choice-question input[type="text"]{
  font-family:'Inter',sans-serif; font-size:15px;
  padding:8px 12px; border:1px solid var(--rule); border-radius:3px;
  background:#fdfcf9;
}
.jspsych-survey-multi-choice-option{ margin:4px 0; }
.jspsych-survey-multi-choice-option label{ font-size:15px; cursor:pointer; }

/* SPR display */
.spr-stage{
  min-height:240px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px 0;
}
.spr-text{
  font-family:'Crimson Pro',Georgia,serif;
  font-size:28px; line-height:1.7;
  text-align:left;
  max-width:680px;
  white-space:pre-wrap;
}
.spr-text.bn{
  font-family:'Noto Sans Bengali',sans-serif;
  font-size:30px; line-height:1.9;
}
.spr-mask{ color:var(--gray); letter-spacing:.04em; }
.spr-hint{ margin-top:48px; color:var(--muted); font-size:13px; transition:opacity .2s; }
.spr-hint.hidden{ opacity:0; }

.fixation{ font-size:46px; text-align:center; font-family:Georgia,serif; }

/* Comp Q */
.compq{ font-family:'Crimson Pro',Georgia,serif; font-size:22px; text-align:center; margin-bottom:18px; }
.compq.bn{ font-family:'Noto Sans Bengali',sans-serif; font-size:24px; }

/* Canvas */
#mot-canvas, #enum-canvas{
  background:#fafaf6; border:1px solid var(--rule);
  display:block; margin:0 auto;
}
.task-status{
  margin-top:14px; font-size:14px;

.demo-row.bn{ font-family:'Noto Sans Bengali',sans-serif; font-size:22px; }

}

.btn-primary, .btn-secondary{

.btn-primary:hover{ background:#3a3631; }

/* Submission-status banners on final screen */

<body>
<script>
/* =========================================================================
 * Topology of Grammar — Study 1
 * Krea Computational Cognition Laboratory
 *
 * Deployment notes:
 *   - This is a self-contained, single-file jsPsych 8 experiment.
 *   - Serves from any static host (GitHub Pages, Netlify, JATOS, your lab
 *     server, or even file://) and requires only a modern browser.
 *   - Three deployment modes are supported automatically:
 *       (1) JATOS:        if window.jatos is detected, results POST via
 *                         jatos.submitResultData()
 *       (2) Server POST:  if the URL parameter ?endpoint=https://... is
 *                         supplied, results POST to that URL
 *       (3) Browser DL:   otherwise, results are offered as a JSON download
 *
 *   URL parameters honoured:
 *       ?pid=...           participant ID from Prolific / SONA / etc.
 *                          If absent, a random ID is generated.
 *       ?endpoint=URL      data POST endpoint (mode 2)
 *
 *   See README.md for further deployment instructions.
 * ========================================================================= */

const DEPLOYMENT_CONFIG = (() => {
  const params = new URLSearchParams(window.location.search);
  return {
    participantId: params.get('pid') || params.get('PROLIFIC_PID') ||
                   params.get('participant_id') || null,
    studyId:       params.get('study_id') || params.get('STUDY_ID') || null,
    sessionId:     params.get('session_id') || params.get('SESSION_ID') || null,
    postEndpoint:  params.get('endpoint') || null,
    usingJatos:    typeof window.jatos !== 'undefined'
  };
})();

/* =========================================================================
 * Topology of Grammar — Study 1 (v3)
 *
 * Architectural change from v2: the dynamic addNodeToEndOfTimeline approach
 * is abandoned. Instead, both English and Bengali procedures are built up
 * front, and conditional_function on each procedure ensures only the
 * appropriate language block runs. This is the standard, reliable jsPsych
 * pattern.
 * ========================================================================= */


/* =========================================================================
 * PART 1 — Custom plugins
 * ========================================================================= */

class MovingWindowSPRPlugin {
  constructor(jsPsych){ this.jsPsych = jsPsych; }
  trial(display_element, trial){
    const words = trial.sentence.split(/\s+/);
    const langClass = trial.language === 'bn' ? 'bn' : 'en';
    const maskChar = trial.language === 'bn' ? '\u25CC' : '_';
    let idx = -1;
    let pressTimes = [];
    let started = false;

    const render = () => {
      let html = '<div class="spr-stage"><div class="spr-text ' + langClass + '">';
      for(let i=0;i<words.length;i++){
        const w = words[i];
        const visible = (i === idx);
        const masked = visible ? w : w.replace(/\S/g, maskChar);
        html += '<span class="' + (visible ? 'spr-word' : 'spr-mask') + '">' + masked + '</span>';
        if(i < words.length - 1) html += ' ';
      }
      html += '</div>';
      const cls = started ? 'spr-hint hidden' : 'spr-hint';
      html += '<div class="' + cls + '">Press <span class="kbd">SPACE</span> to begin</div>';
      html += '</div>';
      display_element.innerHTML = html;
    };
    render();

    const onKey = (e) => {
      if(e.code !== 'Space') return;
      e.preventDefault();
      started = true;
      pressTimes.push(performance.now());
      idx += 1;
      if(idx >= words.length){
        document.removeEventListener('keydown', onKey);
        const word_rts = [];
        for(let i=1;i<pressTimes.length;i++){
          word_rts.push({
            word_index: i-1,
            word: words[i-1],
            rt_ms: pressTimes[i] - pressTimes[i-1]
          });
        }
        display_element.innerHTML = '';
        this.jsPsych.finishTrial({
          sentence: trial.sentence,
          language: trial.language,
          condition: trial.condition,
          magnitude: trial.magnitude,
          item_id: trial.item_id,
          critical_word_index: trial.critical_word_index,
          word_rts: word_rts,
          total_words: words.length
        });
      } else {
        render();
      }
    };
    document.addEventListener('keydown', onKey);
  }
}
MovingWindowSPRPlugin.info = {
  name: 'moving-window-spr', version: '3.0.0',
  parameters: {
    sentence: { type: 'STRING', default: '' },
    language: { type: 'STRING', default: 'en' },
    condition: { type: 'STRING', default: '' },
    magnitude: { type: 'INT', default: null },
    item_id: { type: 'STRING', default: '' },
    critical_word_index: { type: 'INT', default: null }
  },
  data: {}
};


class MOTPlugin {
  constructor(jsPsych){ this.jsPsych = jsPsych; }
  trial(display_element, trial){
    const W = 680, H = 440;
    const N = trial.n_objects, K = trial.n_targets;
    const radius = 22, speed = trial.speed, trackDur = trial.tracking_duration_ms;

    display_element.innerHTML =
      '<div style="text-align:center">' +
      '<canvas id="mot-canvas" width="'+W+'" height="'+H+'"></canvas>' +
      '<div class="task-status" id="mot-status">Memorise the green disks…</div>' +
      '</div>';
    const canvas = document.getElementById('mot-canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('mot-status');

    const disks = [];
    let safety = 0;
    while(disks.length < N && safety < 1000){
      const x = radius + Math.random()*(W - 2*radius);
      const y = radius + Math.random()*(H - 2*radius);
      let ok = true;
      for(const d of disks){
        if(Math.hypot(d.x-x, d.y-y) < 2.6*radius){ ok = false; break; }
      }
      safety++;
      if(!ok) continue;
      const theta = Math.random()*2*Math.PI;
      disks.push({ x, y, vx: speed*Math.cos(theta), vy: speed*Math.sin(theta),
                   isTarget: false, chosen: false });
    }
    const targetIdx = this.jsPsych.randomization.sampleWithoutReplacement(
      Array.from({length:N}, (_,i)=>i), K
    );
    for(const i of targetIdx) disks[i].isTarget = true;

    const drawDisk = (d, state) => {
      ctx.beginPath(); ctx.arc(d.x, d.y, radius, 0, 2*Math.PI);
      let fill = '#2a2825';
      if(state === 'cue') fill = '#3aa055';
      else if(state === 'chosen') fill = '#c8a04c';
      else if(state === 'feedback-target') fill = '#3aa055';
      else if(state === 'feedback-wrong') fill = '#a83a3a';
      ctx.fillStyle = fill; ctx.fill();
      ctx.strokeStyle = '#1c1a17'; ctx.lineWidth = 1.5; ctx.stroke();
    };
    const drawAll = (mode) => {
      ctx.fillStyle = '#fafaf6'; ctx.fillRect(0,0,W,H);
      for(const d of disks){
        let state = 'default';
        if(mode === 'cue' && d.isTarget) state = 'cue';
        if(mode === 'response' && d.chosen) state = 'chosen';
        if(mode === 'feedback'){
          if(d.isTarget) state = 'feedback-target';
          else if(d.chosen) state = 'feedback-wrong';
        }
        drawDisk(d, state);
      }
    };

    drawAll('cue');
    setTimeout(()=>{
      status.textContent = 'Track the targets while they move…';
      drawAll('default');
      const tStart = performance.now();
      let raf;
      const step = () => {
        const now = performance.now();
        for(const d of disks){
          d.x += d.vx; d.y += d.vy;
          if(d.x < radius){ d.x = radius; d.vx *= -1; }
          if(d.x > W-radius){ d.x = W-radius; d.vx *= -1; }
          if(d.y < radius){ d.y = radius; d.vy *= -1; }
          if(d.y > H-radius){ d.y = H-radius; d.vy *= -1; }
        }
        for(let i=0;i<N;i++){
          for(let j=i+1;j<N;j++){
            const dx = disks[j].x - disks[i].x;
            const dy = disks[j].y - disks[i].y;
            const dist = Math.hypot(dx, dy);
            if(dist < 2*radius + 1 && dist > 0){
              const nx = dx/dist, ny = dy/dist;
              const overlap = 2*radius + 1 - dist;
              disks[i].x -= nx*overlap/2; disks[i].y -= ny*overlap/2;
              disks[j].x += nx*overlap/2; disks[j].y += ny*overlap/2;
              const vi = disks[i].vx*nx + disks[i].vy*ny;
              const vj = disks[j].vx*nx + disks[j].vy*ny;
              disks[i].vx += (vj - vi)*nx; disks[i].vy += (vj - vi)*ny;
              disks[j].vx += (vi - vj)*nx; disks[j].vy += (vi - vj)*ny;
            }
          }
        }
        drawAll('default');
        if(now - tStart < trackDur){ raf = requestAnimationFrame(step); }
        else {
          cancelAnimationFrame(raf);
          status.innerHTML = 'Click the <strong>' + K + '</strong> disks you tracked, then press <span class="kbd">ENTER</span>.';
          drawAll('response');
          const onClick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
            for(const d of disks){
              if(Math.hypot(cx-d.x, cy-d.y) < radius){ d.chosen = !d.chosen; break; }
            }
            drawAll('response');
          };
          canvas.addEventListener('click', onClick);
          const onEnter = (e) => {
            if(e.code !== 'Enter') return;
            const chosen = disks.filter(d=>d.chosen).length;
            if(chosen !== K){
              status.innerHTML = 'Please select exactly <strong>' + K + '</strong>. (Currently selected: ' + chosen + '.)';
              return;
            }
            canvas.removeEventListener('click', onClick);
            document.removeEventListener('keydown', onEnter);
            const hits = disks.filter(d=>d.isTarget && d.chosen).length;
            const fa = disks.filter(d=>!d.isTarget && d.chosen).length;
            drawAll('feedback');
            status.innerHTML = '<strong>' + hits + '</strong> of ' + K + ' targets tracked.';
            setTimeout(()=>{
              display_element.innerHTML = '';
              this.jsPsych.finishTrial({
                n_objects: N, n_targets: K,
                hits, false_alarms: fa, accuracy: hits / K
              });
            }, 1800);
          };
          document.addEventListener('keydown', onEnter);
        }
      };
      raf = requestAnimationFrame(step);
    }, 2000);
  }
}
MOTPlugin.info = {
  name: 'mot', version: '3.0.0',
  parameters: {
    n_objects: { type: 'INT', default: 8 },
    n_targets: { type: 'INT', default: 4 },
    tracking_duration_ms: { type: 'INT', default: 7000 },
    speed: { type: 'FLOAT', default: 3.5 }
  },
  data: {}
};


class EnumerationPlugin {
  constructor(jsPsych){ this.jsPsych = jsPsych; }
  trial(display_element, trial){
    const W = 480, H = 360, N = trial.n_dots, dotR = 9;

    display_element.innerHTML =
      '<div style="text-align:center">' +
      '<canvas id="enum-canvas" width="'+W+'" height="'+H+'"></canvas>' +
      '<div class="task-status">Fixate the centre…</div>' +
      '</div>';
    const canvas = document.getElementById('enum-canvas');
    const ctx = canvas.getContext('2d');

    const drawFixation = () => {
      ctx.fillStyle = '#fafaf6'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#1c1a17';
      ctx.fillRect(W/2-1, H/2-8, 2, 16); ctx.fillRect(W/2-8, H/2-1, 16, 2);
    };
    const positions = [];
    let safety = 0;
    while(positions.length < N && safety < 5000){
      const x = dotR*2 + Math.random()*(W - 4*dotR);
      const y = dotR*2 + Math.random()*(H - 4*dotR);
      let ok = true;
      for(const p of positions){
        if(Math.hypot(p.x-x, p.y-y) < 3.4*dotR){ ok = false; break; }
      }
      if(ok) positions.push({x,y});
      safety++;
    }
    const drawDots = () => {
      ctx.fillStyle = '#fafaf6'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#1c1a17';
      for(const p of positions){
        ctx.beginPath(); ctx.arc(p.x, p.y, dotR, 0, 2*Math.PI); ctx.fill();
      }
    };
    const drawMask = () => {
      ctx.fillStyle = '#fafaf6'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#1c1a17';
      for(let i=0;i<70;i++){
        ctx.beginPath();

            '</div>';

          input.focus();
          const onKey = (e) => {
            if(e.code !== 'Enter') return;
            const resp = parseInt(input.value, 10);
            if(isNaN(resp)) return;
            document.removeEventListener('keydown', onKey);

              correct: resp === N, error: resp - N,
              rt_ms: performance.now() - offset

class DigitSpanPlugin {
  constructor(jsPsych){ this.jsPsych = jsPsych; }
  trial(display_element, trial){
    const len = trial.span_length;
    const seq = [];
    for(let i=0;i<len;i++) seq.push(Math.floor(Math.random()*10));

    display_element.innerHTML = '<div class="digit-display" id="ds-stage">+</div>';
    const stage = document.getElementById('ds-stage');

    let i = 0;
    const showNext = () => {
      if(i >= seq.length){
        display_element.innerHTML =
          '<div style="text-align:center;padding:30px">' +
          '<p style="font-size:18px;margin-bottom:18px">Type the digits in <strong>reverse</strong> order.</p>' +
          '<input id="ds-input" class="digit-input" type="text" autocomplete="off" inputmode="numeric" autofocus>' +
          '<p class="muted" style="margin-top:14px;font-size:13px">Press <span class="kbd">ENTER</span> to submit.</p>' +
          '</div>';
        const input = document.getElementById('ds-input');
        input.focus();
        const onKey = (e) => {
          if(e.code !== 'Enter') return;
          const respArr = input.value.replace(/\s+/g,'').split('').map(c=>parseInt(c,10)).filter(n=>!isNaN(n));
          const correctArr = [...seq].reverse();
          const correct = respArr.length === correctArr.length &&
                          respArr.every((d, idx) => d === correctArr[idx]);
          document.removeEventListener('keydown', onKey);
          this.jsPsych.finishTrial({
            span_length: len, sequence: seq, response: respArr, correct
          });
        };
        document.addEventListener('keydown', onKey);
        return;
      }
      stage.textContent = seq[i];
      i++;
      setTimeout(()=>{
        stage.textContent = '';
        setTimeout(showNext, 400);
      }, 800);
    };
    setTimeout(showNext, 800);
  }
}
DigitSpanPlugin.info = {
  name: 'digit-span', version: '3.0.0',
  parameters: { span_length: { type: 'INT', default: 4 } }, data: {}
};

/* =========================================================================
 * PART 3 — Helpers
 * ========================================================================= */

function numWordEN(n){
  return ['','one','two','three','four','five','six','seven','eight','nine','ten'][n] || String(n);
}
function numWordBN(n){
  return ['','এক','দুই','তিন','চার','পাঁচ','ছয়','সাত','আট','নয়','দশ'][n] || String(n);
}

function buildSentence(item, lang, condition, magnitude){
  let dp;
  if(lang === 'en'){
    if(condition === 'canonical')   dp = numWordEN(magnitude) + ' ' + item.adj + ' ' + item.noun;
    else                            dp = item.adj + ' ' + numWordEN(magnitude) + ' ' + item.noun;
  } else {
    const numcl = numWordBN(magnitude) + '-' + item.classifier;
    if(condition === 'canonical')                dp = numcl + ' ' + item.adj + ' ' + item.noun;
    else if(condition === 'reduplicated-inside') dp = numcl + ' ' + item.adj + ' ' + item.adj + ' ' + item.noun;
    else                                         dp = item.adj + ' ' + item.adj + ' ' + numcl + ' ' + item.noun;
  }
  const sentence = item.frame.replace('[DP]', dp);
  const tokens = sentence.split(/\s+/);
  const critical_word_index = tokens.findIndex(t => t.includes(item.noun));
  return { sentence, critical_word_index };
}

function buildCriticalTrials(items, lang, subjectId){
  // v4 fix: condition assignment (Latin square) and magnitude assignment are
  // now INDEPENDENT. v3 used `cond = conditions[(i+parity) % 3]` together with
  // `mag = magnitudes[i % 6]`, which gave (cond, mag) pairs cycling at
  // lcm(3,6) = 6 — perfectly confounding condition with magnitude within
  // each participant. The fix below assigns conditions first, then shuffles
  // magnitudes independently within each condition's item group.
  const conditions = (lang === 'en')
    ? ['canonical','inverted']
    : ['canonical','reduplicated-inside','reduplicated-outside'];
  const magnitudes = [2,3,4,6,8,10];
  const parity = subjectId % conditions.length;

  // Step 1: assign conditions via Latin square (unchanged).
  const condAssignments = items.map((_, i) => conditions[(i + parity) % conditions.length]);

  // Step 2: for each condition, independently shuffle magnitudes (with
  // replication if the condition group has more items than magnitudes).
  const magsPerCond = {};
  for (const c of conditions) {
    const nItemsInCond = condAssignments.filter(x => x === c).length;
    const reps = Math.ceil(nItemsInCond / magnitudes.length);
    const expanded = [];
    for (let r = 0; r < reps; r++) expanded.push(...magnitudes);
    magsPerCond[c] = jsPsych.randomization.shuffle(expanded).slice(0, nItemsInCond);
  }

  // Step 3: walk items, assigning condition and consuming the next magnitude
  // from that condition's shuffled list.
  const magIdx = {};
  for (const c of conditions) magIdx[c] = 0;

  return items.map((item, i) => {
    const cond = condAssignments[i];
    const mag = magsPerCond[cond][magIdx[cond]++];
    const { sentence, critical_word_index } = buildSentence(item, lang, cond, mag);
    return {
      item_id: item.id, sentence, language: lang,
      condition: cond, magnitude: mag, critical_word_index,
      comp_q: item.comp_q, comp_ans: item.ans
    };
  });
}

 * PART 4 — Initialisation

const subjectId = DEPLOYMENT_CONFIG.participantId ||
                  ('s' + Math.floor(Math.random()*1e8));
let selectedLanguage = null;   // set by language-selection trial's on_finish

// Prevent accidental tab-close mid-session. Disabled at the end of the study.
let sessionInProgress = false;
window.addEventListener('beforeunload', (e) => {
  if (sessionInProgress) {
    e.preventDefault();
    e.returnValue = '';
    return '';
  }
});


/* -------------------------------------------------------------------------
 * Data cleaning: strip the bulky stimulus HTML from instruction trials.
 * This keeps the JSON small (instruction stimuli were ~70% of v3 file size)
 * while preserving all behavioural data and the comprehension question text.
 * ------------------------------------------------------------------------- */
function cleanDataForExport(rawData){
  return rawData.map(t => {
    const c = {...t};
    // Strip stimulus on html-button-response trials that are instruction
    // screens (identified by large stimulus and no phase tag, OR by phase
    // 'instruction'). Comprehension questions have short stimuli (under
    // 300 chars) and a phase ending in '_comp', so they're preserved.
    if (c.trial_type === 'html-button-response' &&
        typeof c.stimulus === 'string' &&
        c.stimulus.length > 300 &&
        (!c.phase || c.phase === 'instruction')) {
      c.stimulus_stripped_chars = c.stimulus.length;
      delete c.stimulus;
    }
    // Always strip the fullscreen trial's message field — it's pure chrome.
    if (c.trial_type === 'fullscreen') {
      delete c.message;
    }
    return c;
  });
}


/* -------------------------------------------------------------------------
 * Session analysis: produce a structured summary of the participant's
 * performance suitable for in-browser display and for downstream review.
 * Returns a plain object; rendering is separate.
 * ------------------------------------------------------------------------- */
function analyseSession(sessionData){
  const data = sessionData.data;
  const sid = sessionData.subjectId;

  const stddev = (arr) => {
    if (arr.length < 2) return 0;
    const m = arr.reduce((a,b)=>a+b,0)/arr.length;
    const v = arr.reduce((s,x)=>s+(x-m)*(x-m),0)/(arr.length-1);
    return Math.sqrt(v);
  };
  const formatDuration = (ms) => {
    const sec = Math.round(ms/1000);
    const m = Math.floor(sec/60), s = sec % 60;
    return m + ':' + String(s).padStart(2,'0');
  };

  // ----- Session header -----
  const langTrial = data.find(t => t.phase === 'language_choice');
  const lang = langTrial ? langTrial.language : 'unknown';
  const langName = lang === 'bn' ? 'Bengali' : (lang === 'en' ? 'English' : 'unknown');
  const lastTrial = data[data.length - 1] || {};
  const durationMs = lastTrial.time_elapsed || 0;

  // ----- Demographics -----
  const demoText = (data.find(t => t.phase === 'demographics_text') || {}).response || {};
  const demoEdu  = (data.find(t => t.phase === 'demographics_education') || {}).response || {};
  const demoMC   = (data.find(t => t.phase === 'demographics_mc') || {}).response || {};

  // ----- SPR: critical-word RT by condition × magnitude -----
  const sprMain = data.filter(t =>
    (t.phase === 'main_en' || t.phase === 'main_bn') &&
    t.condition && t.condition !== 'filler' && t.condition !== 'practice'
  );
  const cellRTs = {};       // condition -> magnitude -> [rts]
  const spilloverRTs = {};  // condition -> magnitude -> [rts]
  const condSet = new Set(), magSet = new Set();
  for (const t of sprMain) {
    const cwi = t.critical_word_index;
    if (cwi === undefined || cwi < 0 || !t.word_rts) continue;
    const cw = t.word_rts.find(w => w.word_index === cwi);
    if (!cw) continue;
    const cond = t.condition, mag = t.magnitude;
    condSet.add(cond); magSet.add(mag);
    if (!cellRTs[cond]) cellRTs[cond] = {};
    if (!cellRTs[cond][mag]) cellRTs[cond][mag] = [];
    cellRTs[cond][mag].push(cw.rt_ms);
    // Spillover: critical_word_index + 1, if it exists
    const sw = t.word_rts.find(w => w.word_index === cwi + 1);
    if (sw) {
      if (!spilloverRTs[cond]) spilloverRTs[cond] = {};
      if (!spilloverRTs[cond][mag]) spilloverRTs[cond][mag] = [];
      spilloverRTs[cond][mag].push(sw.rt_ms);
    }
  }
  const conditions = [...condSet].sort();
  const magnitudes = [...magSet].sort((a,b) => a-b);
  const cellStats = {};
  let totalCells = 0, filledCells = 0;
  for (const c of conditions) {
    cellStats[c] = {};
    for (const m of magnitudes) {
      totalCells++;
      const rts = (cellRTs[c] && cellRTs[c][m]) || [];
      if (rts.length === 0) {
        cellStats[c][m] = null;
      } else {
        filledCells++;
        cellStats[c][m] = {
          mean: rts.reduce((a,b)=>a+b,0)/rts.length,
          sd: stddev(rts),
          n: rts.length
        };
      }
    }
  }
  // Condition marginal means (collapsing across magnitude)
  const condMarginal = {};
  for (const c of conditions) {
    const all = [];
    for (const m of magnitudes) {
      if (cellRTs[c] && cellRTs[c][m]) all.push(...cellRTs[c][m]);
    }
    condMarginal[c] = all.length ? {
      mean: all.reduce((a,b)=>a+b,0)/all.length, sd: stddev(all), n: all.length
    } : null;
  }
  // Magnitude marginal means (collapsing across condition)
  const magMarginal = {};
  for (const m of magnitudes) {
    const all = [];
    for (const c of conditions) {
      if (cellRTs[c] && cellRTs[c][m]) all.push(...cellRTs[c][m]);
    }
    magMarginal[m] = all.length ? {
      mean: all.reduce((a,b)=>a+b,0)/all.length, sd: stddev(all), n: all.length
    } : null;
  }

  // ----- Comprehension -----
  const comps = data.filter(t => t.phase && /_comp$/.test(t.phase));
  const compMain = comps.filter(t => /main.*_comp/.test(t.phase));
  const compAcc = comps.length ? comps.filter(c => c.correct).length / comps.length : null;
  const compMainAcc = compMain.length ? compMain.filter(c => c.correct).length / compMain.length : null;

  // ----- MOT -----
  const motMain = data.filter(t => t.phase === 'mot_main');
  const motByK = {};
  for (const t of motMain) {
    const k = t.target_set_size;
    if (!motByK[k]) motByK[k] = {hits: 0, possible: 0, falseAlarms: 0, trials: 0};
    motByK[k].hits += t.hits || 0;
    motByK[k].possible += k;
    motByK[k].falseAlarms += t.false_alarms || 0;
    motByK[k].trials += 1;
  }
  const motAccByK = {};
  for (const k in motByK) motAccByK[k] = motByK[k].hits / motByK[k].possible;
  // Capacity estimate: K × (2*p - 1) corrected-for-guessing average, averaged across K.
  // This is the standard Hulleman / Scholl-style estimator.
  const motKs = Object.keys(motByK).map(Number).sort();
  let motCapacity = null;
  if (motKs.length) {
    const caps = motKs.map(k => k * (2 * motAccByK[k] - 1));
    motCapacity = caps.reduce((a,b)=>a+b,0) / caps.length;
  }

  // ----- Enumeration -----
  const enumMain = data.filter(t => t.phase === 'enum_main');
  const enumByN = {};
  for (const t of enumMain) {
    const n = t.n_dots;
    if (!enumByN[n]) enumByN[n] = {trials: [], correct: 0, errors: []};
    enumByN[n].trials.push(t);
    if (t.correct) enumByN[n].correct++;
    if (typeof t.error === 'number') enumByN[n].errors.push(t.error);
  }
  const enumStats = {};
  for (const n in enumByN) {
    enumStats[n] = {
      n_trials: enumByN[n].trials.length,
      accuracy: enumByN[n].correct / enumByN[n].trials.length,
      mean_error: enumByN[n].errors.length
        ? enumByN[n].errors.reduce((a,b)=>a+b,0) / enumByN[n].errors.length
        : 0,
      mean_abs_error: enumByN[n].errors.length
        ? enumByN[n].errors.reduce((a,b)=>a+Math.abs(b),0) / enumByN[n].errors.length
        : 0
    };
  }
  // Subitising threshold: highest contiguous N starting from 1 where acc >= 0.75
  let subitThresh = 0;
  for (let n = 1; n <= 9; n++) {
    if (enumStats[n] && enumStats[n].accuracy >= 0.75) subitThresh = n;
    else break;
  }

  // ----- Digit span -----
  const dsTrials = data.filter(t => t.phase === 'digit_span');
  const dsCorrectByLen = {};
  for (const t of dsTrials) {
    const L = t.span_length;
    if (!dsCorrectByLen[L]) dsCorrectByLen[L] = {correct: 0, total: 0};
    dsCorrectByLen[L].total++;
    if (t.correct) dsCorrectByLen[L].correct++;
  }
  const dsMaxAttempted = dsTrials.length ? Math.max(...dsTrials.map(t => t.span_length)) : 0;
  const dsMaxCorrect = Math.max(0, ...dsTrials.filter(t => t.correct).map(t => t.span_length));

  // ----- Data-quality flags -----
  const flags = [];
  if (filledCells < totalCells) {
    flags.push({severity: 'info', text: `${totalCells - filledCells} of ${totalCells} condition×magnitude cells are empty. Expected with a small item set; the full 60-item study fills all cells.`});
  }
  if (compMainAcc !== null && compMainAcc < 0.7) {
    flags.push({severity: 'warning', text: `Main-block comprehension accuracy ${(compMainAcc*100).toFixed(0)}% is below 70%. Consider excluding this participant.`});
  }
  // Short demographic fields
  for (const [k, v] of Object.entries(demoText)) {
    if (typeof v === 'string' && v.trim().length < 2 && k !== 'other_lang') {
      flags.push({severity: 'warning', text: `Demographic field "${k}" has very short response: "${v}". Possible inattentive responding.`});
    }
  }
  // Age plausibility
  const ageNum = parseInt(demoText.age, 10);
  if (demoText.age && (isNaN(ageNum) || ageNum < 18 || ageNum > 100)) {
    flags.push({severity: 'warning', text: `Age field "${demoText.age}" is implausible.`});
  }
  // Abrupt enumeration drops (≥60 percentage points between adjacent N)
  for (let n = 1; n <= 8; n++) {
    if (enumStats[n] && enumStats[n+1] &&
        enumStats[n].accuracy - enumStats[n+1].accuracy >= 0.6) {
      flags.push({severity: 'info', text: `Enumeration accuracy drops sharply from N=${n} (${(enumStats[n].accuracy*100).toFixed(0)}%) to N=${n+1} (${(enumStats[n+1].accuracy*100).toFixed(0)}%) — abrupt rather than gradual.`});
    }
  }
  // MOT non-monotonicity
  if (motKs.length >= 2) {
    const accs = motKs.map(k => motAccByK[k]);
    for (let i = 0; i < accs.length - 1; i++) {
      if (accs[i+1] - accs[i] > 0.15) {
        flags.push({severity: 'info', text: `MOT accuracy is non-monotonic: rises from k=${motKs[i]} (${(accs[i]*100).toFixed(0)}%) to k=${motKs[i+1]} (${(accs[i+1]*100).toFixed(0)}%). Possible practice effect.`});
        break;
      }
    }
  }
  // SPR practice accuracy proxy: very fast or very slow per-word RT
  const allMainRTs = sprMain.flatMap(t => (t.word_rts || []).map(w => w.rt_ms));
  if (allMainRTs.length) {
    const meanRT = allMainRTs.reduce((a,b)=>a+b,0)/allMainRTs.length;
    if (meanRT < 200) flags.push({severity: 'warning', text: `Mean per-word reading time is ${meanRT.toFixed(0)} ms — implausibly fast. Possible button-mashing.`});
    if (meanRT > 2500) flags.push({severity: 'info', text: `Mean per-word reading time is ${meanRT.toFixed(0)} ms — unusually slow.`});
  }

  return {
    subjectId: sid,
    language: lang,
    languageName: langName,
    totalTrials: data.length,
    durationMs,
    durationStr: formatDuration(durationMs),
    demographics: {
      ...demoText,
      education: demoEdu.education || '(not recorded)',
      ...demoMC
    },
    spr: {
      criticalTrials: sprMain.length,
      conditions, magnitudes,
      cellStats, condMarginal, magMarginal,
      meanRT: allMainRTs.length ? allMainRTs.reduce((a,b)=>a+b,0)/allMainRTs.length : null
    },
    comprehension: {
      total: comps.length, correct: comps.filter(c => c.correct).length,
      accuracy: compAcc,
      mainTotal: compMain.length, mainAccuracy: compMainAcc
    },
    mot: { byK: motByK, accByK: motAccByK, capacity: motCapacity, ks: motKs },
    enumeration: { stats: enumStats, subitThresh, total: enumMain.length },
    digitSpan: {
      byLength: dsCorrectByLen,
      maxAttempted: dsMaxAttempted,
      maxCorrect: dsMaxCorrect,
      totalTrials: dsTrials.length
    },
    flags
  };
}


/* -------------------------------------------------------------------------
 * Render the analysis as HTML for in-browser display.
 * ------------------------------------------------------------------------- */
function renderSummaryHTML(s){
  const fmtMs = (v) => v === null || v === undefined ? '—' : Math.round(v) + ' ms';
  const fmtPct = (v) => v === null || v === undefined ? '—' : (v*100).toFixed(0) + '%';

  let html = '<div class="summary-content">';
  html += '<h2 style="margin-top:0">Session summary</h2>';

  // --- Session ---
  html += '<section><h3>Session</h3><table class="sum-tbl">';
  html += `<tr><th>Subject ID</th><td>${s.subjectId}</td></tr>`;
  html += `<tr><th>Reading language</th><td>${s.languageName}</td></tr>`;
  html += `<tr><th>Total trials</th><td>${s.totalTrials}</td></tr>`;
  html += `<tr><th>Session duration</th><td>${s.durationStr}</td></tr>`;
  html += '</table></section>';

  // --- Demographics ---
  html += '<section><h3>Demographics</h3><table class="sum-tbl">';
  const demoOrder = ['age','gender','handedness','country','native_lang','other_lang','education','vision'];
  for (const k of demoOrder) {
    if (s.demographics[k] !== undefined) {
      html += `<tr><th>${k.replace(/_/g,' ')}</th><td>${s.demographics[k] || '—'}</td></tr>`;
    }
  }
  html += '</table></section>';

  // --- Reading task ---
  html += '<section><h3>Reading task</h3>';
  html += `<p>Critical trials: ${s.spr.criticalTrials}. `;
  if (s.spr.meanRT !== null) html += `Mean per-word reading time: <strong>${fmtMs(s.spr.meanRT)}</strong>. `;
  html += `Comprehension: <strong>${fmtPct(s.comprehension.mainAccuracy)}</strong> on main block (${s.comprehension.correct}/${s.comprehension.total} overall including practice).</p>`;

  // Crosstab
  if (s.spr.conditions.length && s.spr.magnitudes.length) {
    html += '<h4>Critical-word RT by condition × magnitude (mean ms, n)</h4>';
    html += '<table class="sum-tbl crosstab"><thead><tr><th></th>';
    for (const m of s.spr.magnitudes) html += `<th>mag=${m}</th>`;
    html += '<th>marginal</th></tr></thead><tbody>';
    for (const c of s.spr.conditions) {
      html += `<tr><th>${c}</th>`;
      for (const m of s.spr.magnitudes) {
        const cell = s.spr.cellStats[c][m];
        if (cell) html += `<td>${Math.round(cell.mean)}<span class="cell-n"> (${cell.n})</span></td>`;
        else html += '<td class="empty">—</td>';
      }
      const cm = s.spr.condMarginal[c];
      html += `<td class="marginal">${cm ? Math.round(cm.mean) : '—'}<span class="cell-n"> (${cm ? cm.n : 0})</span></td></tr>`;
    }
    // Magnitude marginals row
    html += '<tr><th class="marginal">marginal</th>';
    for (const m of s.spr.magnitudes) {
      const mm = s.spr.magMarginal[m];
      html += `<td class="marginal">${mm ? Math.round(mm.mean) : '—'}<span class="cell-n"> (${mm ? mm.n : 0})</span></td>`;
    }
    html += '<td></td></tr>';
    html += '</tbody></table>';
  }
  html += '</section>';

  // --- MOT ---
  html += '<section><h3>Multiple-object tracking</h3>';
  html += '<table class="sum-tbl"><thead><tr><th>k</th><th>trials</th><th>hits/possible</th><th>accuracy</th></tr></thead><tbody>';
  for (const k of s.mot.ks) {
    const b = s.mot.byK[k];
    html += `<tr><td>${k}</td><td>${b.trials}</td><td>${b.hits}/${b.possible}</td><td>${fmtPct(s.mot.accByK[k])}</td></tr>`;
  }
  html += '</tbody></table>';
  if (s.mot.capacity !== null) {
    html += `<p>Estimated tracking capacity (K(2p − 1) averaged over k): <strong>${s.mot.capacity.toFixed(2)}</strong></p>`;
  }
  html += '</section>';

  // --- Enumeration ---
  html += '<section><h3>Enumeration</h3>';
  html += '<table class="sum-tbl"><thead><tr><th>N</th><th>trials</th><th>accuracy</th><th>mean error</th></tr></thead><tbody>';
  for (let n = 1; n <= 9; n++) {
    const e = s.enumeration.stats[n];
    if (!e) continue;
    const errStr = e.mean_error > 0 ? '+' + e.mean_error.toFixed(2) : e.mean_error.toFixed(2);
    html += `<tr><td>${n}</td><td>${e.n_trials}</td><td>${fmtPct(e.accuracy)}</td><td>${errStr}</td></tr>`;
  }
  html += '</tbody></table>';
  html += `<p>Subitising threshold (highest N with ≥75% accuracy, contiguous from 1): <strong>N = ${s.enumeration.subitThresh || '—'}</strong></p>`;
  html += '</section>';

  // --- Digit span ---
  html += '<section><h3>Reverse digit span</h3>';
  html += '<table class="sum-tbl"><thead><tr><th>length</th><th>correct/total</th></tr></thead><tbody>';
  const lengths = Object.keys(s.digitSpan.byLength).map(Number).sort();
  for (const L of lengths) {
    const b = s.digitSpan.byLength[L];
    html += `<tr><td>${L}</td><td>${b.correct}/${b.total}</td></tr>`;
  }
  html += '</tbody></table>';
  html += `<p>Maximum span length with at least one correct trial: <strong>${s.digitSpan.maxCorrect || '—'}</strong></p>`;
  html += '</section>';

  // --- Flags ---
  if (s.flags.length) {
    html += '<section><h3>Data-quality flags</h3><ul class="flags">';
    for (const f of s.flags) {
      html += `<li class="flag-${f.severity}"><strong>${f.severity.toUpperCase()}:</strong> ${f.text}</li>`;
    }
    html += '</ul></section>';
  } else {
    html += '<section><h3>Data-quality flags</h3><p>None.</p></section>';
  }

  html += '</div>';
  return html;
}


/* -------------------------------------------------------------------------
 * Render the analysis as plain text (for the clipboard / TXT export).
 * ------------------------------------------------------------------------- */
function renderSummaryText(s){
  const pad = (s, n) => String(s).padEnd(n);
  const lpad = (s, n) => String(s).padStart(n);
  const lines = [];
  lines.push('SESSION SUMMARY — Topology of Grammar, Study 1');
  lines.push('='.repeat(60));
  lines.push(`Subject ID:       ${s.subjectId}`);
  lines.push(`Reading language: ${s.languageName}`);
  lines.push(`Total trials:     ${s.totalTrials}`);
  lines.push(`Duration:         ${s.durationStr}`);
  lines.push('');
  lines.push('DEMOGRAPHICS');
  lines.push('-'.repeat(60));
  const demoOrder = ['age','gender','handedness','country','native_lang','other_lang','education','vision'];
  for (const k of demoOrder) {
    if (s.demographics[k] !== undefined) {
      lines.push(`  ${pad(k, 16)} ${s.demographics[k] || '—'}`);
    }
  }
  lines.push('');
  lines.push('READING TASK');
  lines.push('-'.repeat(60));
  lines.push(`  Critical trials:           ${s.spr.criticalTrials}`);
  if (s.spr.meanRT !== null) lines.push(`  Mean per-word RT:          ${Math.round(s.spr.meanRT)} ms`);
  if (s.comprehension.mainAccuracy !== null) {
    lines.push(`  Main-block comprehension:  ${(s.comprehension.mainAccuracy*100).toFixed(1)}%`);
  }
  lines.push('');
  if (s.spr.conditions.length && s.spr.magnitudes.length) {
    lines.push('  Critical-word RT (ms), by condition × magnitude:');
    let header = '  ' + pad('', 24);
    for (const m of s.spr.magnitudes) header += lpad('mag=' + m, 8);
    header += lpad('marg', 8);
    lines.push(header);
    for (const c of s.spr.conditions) {
      let row = '  ' + pad(c, 24);
      for (const m of s.spr.magnitudes) {
        const cell = s.spr.cellStats[c][m];
        row += lpad(cell ? Math.round(cell.mean) + '(' + cell.n + ')' : '—', 8);
      }
      const cm = s.spr.condMarginal[c];
      row += lpad(cm ? Math.round(cm.mean) + '(' + cm.n + ')' : '—', 8);
      lines.push(row);
    }
  }
  lines.push('');
  lines.push('MOT');
  lines.push('-'.repeat(60));
  for (const k of s.mot.ks) {
    const b = s.mot.byK[k];
    lines.push(`  k=${k}: ${b.trials} trials, ${b.hits}/${b.possible} hits, accuracy ${(s.mot.accByK[k]*100).toFixed(0)}%`);
  }
  if (s.mot.capacity !== null) {
    lines.push(`  Capacity estimate: ${s.mot.capacity.toFixed(2)}`);
  }
  lines.push('');
  lines.push('ENUMERATION');
  lines.push('-'.repeat(60));
  for (let n = 1; n <= 9; n++) {
    const e = s.enumeration.stats[n];
    if (!e) continue;
    const errStr = e.mean_error >= 0 ? '+' + e.mean_error.toFixed(2) : e.mean_error.toFixed(2);
    lines.push(`  N=${n}: ${e.n_trials} trials, accuracy ${(e.accuracy*100).toFixed(0)}%, mean error ${errStr}`);
  }
  lines.push(`  Subitising threshold: N = ${s.enumeration.subitThresh || '—'}`);
  lines.push('');
  lines.push('DIGIT SPAN (REVERSE)');
  lines.push('-'.repeat(60));
  for (const L of Object.keys(s.digitSpan.byLength).map(Number).sort()) {
    const b = s.digitSpan.byLength[L];
    lines.push(`  length=${L}: ${b.correct}/${b.total} correct`);
  }
  lines.push(`  Max correct length: ${s.digitSpan.maxCorrect || '—'}`);
  lines.push('');
  if (s.flags.length) {
    lines.push('DATA-QUALITY FLAGS');
    lines.push('-'.repeat(60));
    for (const f of s.flags) {
      lines.push(`  [${f.severity.toUpperCase()}] ${f.text}`);
    }
  } else {
    lines.push('DATA-QUALITY FLAGS: none');
  }
  lines.push('');
  return lines.join('\n');
}


const jsPsych = initJsPsych({
  show_progress_bar: false,
  on_finish: () => {
    sessionInProgress = false;     // allow tab-close now
    const rawData = jsPsych.data.get().values();
    const cleanData = cleanDataForExport(rawData);
    const sessionData = {
      subjectId,
      deployment: DEPLOYMENT_CONFIG,
      submittedAt: new Date().toISOString(),
      data: cleanData
    };
    const jsonStr = JSON.stringify(sessionData, null, 2);

    // ----- Compute analysis (lazy) -----
    let analysis = null, summaryHTML = null, summaryText = null;
    const ensureAnalysis = () => {
      if (!analysis) {
        analysis = analyseSession(sessionData);
        summaryHTML = renderSummaryHTML(analysis);
        summaryText = renderSummaryText(analysis);
      }
    };

    // ----- Route data: JATOS > POST > download -----
    let submissionStatus = 'pending';
    let submissionMessage = '';

    const writeFinalScreen = () => {
      const jsonBlob = new Blob([jsonStr], {type: 'application/json'});
      const jsonUrl = URL.createObjectURL(jsonBlob);
      let statusBanner = '';
      if (submissionStatus === 'sent') {
        statusBanner = `<div class="status-banner status-ok">✓ Your data has been submitted to the experimenter. ${submissionMessage}</div>`;
      } else if (submissionStatus === 'failed') {
        statusBanner = `<div class="status-banner status-warn">⚠ Automatic submission failed (${submissionMessage}). Please download the file below and email it to the experimenter.</div>`;
      } else if (submissionStatus === 'local') {
        statusBanner = `<div class="status-banner">Please download your data file and send it to the experimenter.</div>`;
      }

      document.body.innerHTML = `
        <div class="final-shell">
          <div class="final-card">
            <h1>Thank you.</h1>
            <p class="lede">Your session is complete.</p>
            ${statusBanner}
            <div class="final-buttons">
              <a id="dl-json" class="btn-primary" href="${jsonUrl}" download="topology_subject_${subjectId}.json">Download data (JSON)</a>
              <button id="show-summary" class="btn-secondary">Show analysis summary</button>
            </div>
            <p class="muted final-sid">Session ID: ${subjectId}</p>
            <div id="summary-region" style="display:none"></div>
          </div>
        </div>`;

      document.getElementById('show-summary').addEventListener('click', () => {
        ensureAnalysis();
        const region = document.getElementById('summary-region');
        const btn = document.getElementById('show-summary');
        if (region.style.display === 'none') {
          region.innerHTML = summaryHTML +
            '<div class="summary-actions">' +
            '<button id="copy-summary" class="btn-secondary">Copy summary as text</button>' +
            '<button id="dl-summary" class="btn-secondary">Download summary (TXT)</button>' +
            '</div>';
          region.style.display = 'block';
          btn.textContent = 'Hide analysis summary';
          document.getElementById('copy-summary').addEventListener('click', () => {
            navigator.clipboard.writeText(summaryText).then(() => {
              const b = document.getElementById('copy-summary');
              b.textContent = 'Copied ✓';
              setTimeout(() => { b.textContent = 'Copy summary as text'; }, 1500);
            }).catch(() => alert('Clipboard access denied. Please use the download button.'));
          });
          document.getElementById('dl-summary').addEventListener('click', () => {
            const txtBlob = new Blob([summaryText], {type: 'text/plain'});
            const txtUrl = URL.createObjectURL(txtBlob);
            const a = document.createElement('a');
            a.href = txtUrl;
            a.download = 'topology_summary_' + subjectId + '.txt';
            a.click();
            URL.revokeObjectURL(txtUrl);
          });
        } else {
          region.style.display = 'none';
          btn.textContent = 'Show analysis summary';
        }
      });
    };

    if (DEPLOYMENT_CONFIG.usingJatos) {
      // Mode 1: JATOS
      window.jatos.submitResultData(jsonStr)
        .then(() => {
          submissionStatus = 'sent';
          submissionMessage = 'You may close this tab.';
          writeFinalScreen();
          setTimeout(() => window.jatos.endStudy(jsonStr), 2000);
        })
        .catch((err) => {
          submissionStatus = 'failed';
          submissionMessage = 'JATOS submission error: ' + (err && err.message ? err.message : 'unknown');
          writeFinalScreen();
        });
    } else if (DEPLOYMENT_CONFIG.postEndpoint) {
      // Mode 2: POST to custom endpoint
      fetch(DEPLOYMENT_CONFIG.postEndpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: jsonStr
      }).then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        submissionStatus = 'sent';
        submissionMessage = '';
        writeFinalScreen();
      }).catch(err => {
        submissionStatus = 'failed';
        submissionMessage = err.message || 'network error';
        writeFinalScreen();
      });
    } else {
      // Mode 3: browser download
      submissionStatus = 'local';
      writeFinalScreen();
    }
  }
});

/* =========================================================================
 * PART 6 — SPR trial template (parameterised by phase)
 * ========================================================================= */

function sprTrialArray(phase, isBN){
  return [
    {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation">+</div>',
      choices: 'NO_KEYS',
      trial_duration: 600
    },
    {
      type: MovingWindowSPRPlugin,
      sentence:            jsPsych.timelineVariable('sentence'),
      language:            jsPsych.timelineVariable('language'),
      condition:           jsPsych.timelineVariable('condition'),
      magnitude:           jsPsych.timelineVariable('magnitude'),
      item_id:             jsPsych.timelineVariable('item_id'),
      critical_word_index: jsPsych.timelineVariable('critical_word_index'),
      data: { phase: phase }
    },
    {
      timeline: [{
        type: jsPsychHtmlButtonResponse,
        stimulus: () => {
          const q = jsPsych.evaluateTimelineVariable('comp_q');
          return '<div class="compq ' + (isBN ? 'bn' : '') + '">' + q + '</div>';
        },
        choices: isBN ? ['হ্যাঁ','না'] : ['Yes','No'],
        data: () => ({
          phase: phase + '_comp',
          item_id: jsPsych.evaluateTimelineVariable('item_id'),
          comp_ans: jsPsych.evaluateTimelineVariable('comp_ans')
        }),
        on_finish: (d) => {
          const labels = isBN ? ['হ্যাঁ','না'] : ['Yes','No'];
          d.response_label = labels[d.response];
          d.correct = (d.response_label === d.comp_ans);
        }
      }],
      conditional_function: () => jsPsych.evaluateTimelineVariable('comp_q') !== null
    }
  ];
}

let dsLen = 3;
const digitSpanProcedure = {
  timeline: [
    { type: DigitSpanPlugin, span_length: () => dsLen, data: { phase: 'digit_span' } },
    { type: DigitSpanPlugin, span_length: () => dsLen, data: { phase: 'digit_span' } }
  ],
  loop_function: (data) => {
    const lastTwo = data.values().slice(-2);
    const correctCount = lastTwo.filter(t => t.correct).length;
    if(correctCount === 0 || dsLen >= 9) return false;
    dsLen += 1;
    return true;
  }
};
